<body class="bg-background text-on-background selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-background dark:bg-background flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop h-16 fixed top-0 z-50">
<div class="text-headline-md font-headline-md font-bold text-primary dark:text-primary">Bairdo</div>
<div>
<button class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-colors duration-200">Log In</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-margin-mobile py-xl pt-24">
<!-- Signup Container -->
<div class="w-full max-w-[480px] space-y-md">
<!-- Branding/Intro -->
<div class="text-center space-y-xs pb-md">
<h1 class="text-display-lg-mobile md:text-display-lg font-display-lg text-on-surface">Join the Suite</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Experience architectural precision in project management.</p>
</div>
<!-- Main Signup Card -->
<div class="wood-texture p-md md:p-lg rounded-lg border border-outline-variant/30 shadow-2xl relative overflow-hidden group">
<!-- Subtle Light Catch -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-[#3D2B1F] to-transparent"></div>
<form class="space-y-md relative z-10" id="signup-form" novalidate="">
<!-- Name Field -->
<div class="space-y-xs">
<label class="text-label-sm font-label-sm text-outline block" for="full_name">FULL NAME</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body-md px-md py-sm rounded-sm transition-all duration-300 input-glow" id="full_name" name="full_name" placeholder="Arthur M. Baird" required="" type="text"/>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="text-label-sm font-label-sm text-outline block" for="email">EMAIL ADDRESS</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body-md px-md py-sm rounded-sm transition-all duration-300 input-glow" id="email" name="email" placeholder="name@firm.com" required="" type="email"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Password Field -->
<div class="space-y-xs">
<label class="text-label-sm font-label-sm text-outline block" for="password">PASSWORD</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body-md px-md py-sm rounded-sm transition-all duration-300 input-glow" id="password" name="password" required="" type="password"/>
</div>
<!-- Confirm Password -->
<div class="space-y-xs">
<label class="text-label-sm font-label-sm text-outline block" for="confirm_password">CONFIRM</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body-md px-md py-sm rounded-sm transition-all duration-300 input-glow" id="confirm_password" name="confirm_password" required="" type="password"/>
</div>
</div>
<!-- Error Message Anchor -->
<div class="hidden text-error text-label-sm font-label-sm flex items-center gap-base animate-pulse" id="password-error">
<span class="material-symbols-outlined text-[16px]">error</span>
                        Passwords do not match.
                    </div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary font-bold py-md rounded-sm text-body-md active:scale-[0.98] transition-all duration-150 hover:brightness-110 shadow-lg shadow-primary/10" type="submit">
                        Create Account
                    </button>
</form>
<div class="relative my-lg flex items-center">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-sm text-label-sm font-label-sm text-outline uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Signup Wrapper -->
<div class="w-full" id="social-signup-wrapper">
<button class="w-full flex items-center justify-center gap-sm bg-surface-container-low border border-outline-variant text-on-surface font-body-md py-sm px-md rounded-sm hover:bg-surface-container transition-colors duration-200 group">

<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Sign up with Google
                    </button>

</div>
<div class="text-label-sm font-label-sm text-on-surface-variant">© 2024 Bairdo Professional Suite. All rights reserved.</div>
</footer>
<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithPopup, updateProfile, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ==========================================
  // 🔧 نفس الـ config اللي في login.html
  // ==========================================
  const firebaseConfig = {
    apiKey: "AIzaSyD3CWk3-mBly4eJDIzUdA_FOXYX2-L9Yd4",
    authDomain: "bairdo-e23a3.firebaseapp.com",
    projectId: "bairdo-e23a3",
    storageBucket: "bairdo-e23a3.firebasestorage.app",
    messagingSenderId: "8126805307",
    appId: "1:8126805307:web:dbf71743bd29a3b73d731e"
  };
  // ==========================================

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  // لو مسجل دخول بالفعل روحه على home
  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = "home.html";
  });

  const form = document.getElementById('signup-form');
  const passwordInput = document.getElementById('password');
  const confirmInput = document.getElementById('confirm_password');
  const errorMsg = document.getElementById('password-error');

  // ---- Email/Password Sign Up ----
  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const name = document.getElementById('full_name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = passwordInput.value;
    const confirm = confirmInput.value;

    // Validation
    if (password !== confirm) {
      errorMsg.textContent = "Passwords do not match.";
      errorMsg.classList.remove('hidden');
      confirmInput.classList.add('border-error');
      shake();
      return;
    }
    if (password.length < 6) {
      errorMsg.textContent = "Password must be at least 6 characters.";
      errorMsg.classList.remove('hidden');
      passwordInput.classList.add('border-error');
      shake();
      return;
    }

    errorMsg.classList.add('hidden');
    confirmInput.classList.remove('border-error');
    passwordInput.classList.remove('border-error');

    const btn = form.querySelector('button[type="submit"]');
    btn.textContent = "Creating Account...";
    btn.disabled = true;

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      // حفظ الاسم في الـ profile
      await updateProfile(cred.user, { displayName: name });
      // onAuthStateChanged هيعمل redirect لـ home.html
    } catch (error) {
      btn.textContent = "Create Account";
      btn.disabled = false;

      let msg = "حدث خطأ، حاول مرة أخرى.";
      if (error.code === 'auth/email-already-in-use') msg = "This email is already registered. Try logging in.";
      else if (error.code === 'auth/invalid-email') msg = "Invalid email address.";
      else if (error.code === 'auth/weak-password') msg = "Password is too weak.";

      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
      shake();
    }
  });

  // ---- Google Sign Up ----
  const googleBtn = document.querySelector('#social-signup-wrapper button');
  googleBtn.addEventListener('click', async () => {
    const originalHTML = googleBtn.innerHTML;
    googleBtn.disabled = true;
    googleBtn.innerHTML = `<span style="font-family:'Material Symbols Outlined'; animation:spin 1s linear infinite; display:inline-block;">progress_activity</span> &nbsp;Connecting...`;

    try {
      await signInWithPopup(auth, googleProvider);
      // onAuthStateChanged هيعمل redirect
    } catch (error) {
      googleBtn.innerHTML = originalHTML;
      googleBtn.disabled = false;
      if (error.code !== 'auth/popup-closed-by-user') {
        errorMsg.textContent = "Google sign-up failed. Try again.";
        errorMsg.classList.remove('hidden');
      }
    }
  });

  // ---- Log In link ----
  document.querySelector('a[href="#"]').href = "login.html";
  document.querySelector('header button').onclick = () => window.location.href = "login.html";

  // Live validation
  [passwordInput, confirmInput].forEach(el => {
    el.addEventListener('input', () => {
      if (passwordInput.value === confirmInput.value) {
        errorMsg.classList.add('hidden');
        confirmInput.classList.remove('border-error');
        passwordInput.classList.remove('border-error');
      }
    });
  });

  // Shake helper
  function shake() {
    const card = form.parentElement;
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'shake 0.3s ease-in-out';
  }

  // Animations
  const style = document.createElement('style');
  style.innerHTML = `
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  `;
  document.head.appendChild(style);
</script>
</body></html>
